<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #0f2742; }
      .label { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f2742; }
      .small { font-family: Arial, sans-serif; font-size: 18px; fill: #0f2742; }
      .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #0f2742; }
      .actor { stroke: #1e5d93; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line { stroke: #1e5d93; stroke-width: 2.5; fill: none; }
      .dash { stroke: #4d6f8c; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; }
      .boundary { stroke: #143d66; stroke-width: 3; fill: #ffffff; }
      .usecase { stroke: #2d6fa3; stroke-width: 2.5; fill: #dff1fb; }
      .system { stroke: #2d6fa3; stroke-width: 2.5; fill: #eef8ff; }
      .note { font-family: Arial, sans-serif; font-size: 16px; fill: #4b6175; }
    </style>
  </defs>

  <rect x="270" y="40" width="1040" height="900" rx="2" class="boundary"/>
  <text x="790" y="88" text-anchor="middle" class="title">TasmimApp</text>

  <!-- Actors -->
  <g transform="translate(105,190)">
    <circle cx="0" cy="0" r="18" class="actor"/>
    <line x1="0" y1="18" x2="0" y2="88" class="actor"/>
    <line x1="-45" y1="45" x2="45" y2="45" class="actor"/>
    <line x1="0" y1="88" x2="-40" y2="145" class="actor"/>
    <line x1="0" y1="88" x2="40" y2="145" class="actor"/>
    <text x="0" y="185" text-anchor="middle" class="label">Visiteur</text>
  </g>

  <g transform="translate(105,485)">
    <circle cx="0" cy="0" r="18" class="actor"/>
    <line x1="0" y1="18" x2="0" y2="88" class="actor"/>
    <line x1="-45" y1="45" x2="45" y2="45" class="actor"/>
    <line x1="0" y1="88" x2="-40" y2="145" class="actor"/>
    <line x1="0" y1="88" x2="40" y2="145" class="actor"/>
    <text x="0" y="185" text-anchor="middle" class="label">Utilisateur</text>
    <text x="0" y="210" text-anchor="middle" class="label">authentifié</text>
  </g>

  <g transform="translate(105,765)">
    <circle cx="0" cy="0" r="18" class="actor"/>
    <line x1="0" y1="18" x2="0" y2="88" class="actor"/>
    <line x1="-45" y1="45" x2="45" y2="45" class="actor"/>
    <line x1="0" y1="88" x2="-40" y2="145" class="actor"/>
    <line x1="0" y1="88" x2="40" y2="145" class="actor"/>
    <text x="0" y="185" text-anchor="middle" class="label">Responsable</text>
  </g>

  <!-- Use cases -->
  <ellipse cx="460" cy="150" rx="150" ry="45" class="usecase"/>
  <text x="460" y="145" text-anchor="middle" class="label">Consulter les</text>
  <text x="460" y="171" text-anchor="middle" class="label">informations de l'agence</text>

  <ellipse cx="460" cy="250" rx="150" ry="45" class="usecase"/>
  <text x="460" y="245" text-anchor="middle" class="label">Consulter les</text>
  <text x="460" y="271" text-anchor="middle" class="label">services</text>

  <ellipse cx="460" cy="350" rx="150" ry="45" class="usecase"/>
  <text x="460" y="345" text-anchor="middle" class="label">Consulter les</text>
  <text x="460" y="371" text-anchor="middle" class="label">projets</text>

  <ellipse cx="460" cy="450" rx="150" ry="45" class="usecase"/>
  <text x="460" y="445" text-anchor="middle" class="label">Envoyer un message</text>
  <text x="460" y="471" text-anchor="middle" class="label">de contact</text>

  <ellipse cx="760" cy="210" rx="135" ry="45" class="usecase"/>
  <text x="760" y="205" text-anchor="middle" class="label">Créer un</text>
  <text x="760" y="231" text-anchor="middle" class="label">compte</text>

  <ellipse cx="760" cy="330" rx="135" ry="45" class="usecase"/>
  <text x="760" y="337" text-anchor="middle" class="label">Se connecter</text>

  <ellipse cx="760" cy="450" rx="135" ry="45" class="usecase"/>
  <text x="760" y="445" text-anchor="middle" class="label">Réinitialiser le</text>
  <text x="760" y="471" text-anchor="middle" class="label">mot de passe</text>

  <ellipse cx="760" cy="580" rx="135" ry="45" class="usecase"/>
  <text x="760" y="575" text-anchor="middle" class="label">Consulter son</text>
  <text x="760" y="601" text-anchor="middle" class="label">profil</text>

  <ellipse cx="760" cy="700" rx="135" ry="45" class="usecase"/>
  <text x="760" y="707" text-anchor="middle" class="label">Se déconnecter</text>

  <ellipse cx="1040" cy="520" rx="150" ry="45" class="usecase"/>
  <text x="1040" y="515" text-anchor="middle" class="label">Accéder à l'espace</text>
  <text x="1040" y="541" text-anchor="middle" class="label">responsable</text>

  <ellipse cx="1040" cy="650" rx="150" ry="45" class="usecase"/>
  <text x="1040" y="645" text-anchor="middle" class="label">Consulter les</text>
  <text x="1040" y="671" text-anchor="middle" class="label">messages reçus</text>

  <ellipse cx="1040" cy="770" rx="150" ry="45" class="usecase"/>
  <text x="1040" y="765" text-anchor="middle" class="label">Marquer un message</text>
  <text x="1040" y="791" text-anchor="middle" class="label">comme lu</text>

  <ellipse cx="1040" cy="880" rx="150" ry="45" class="usecase"/>
  <text x="1040" y="875" text-anchor="middle" class="label">Supprimer un</text>
  <text x="1040" y="901" text-anchor="middle" class="label">message</text>

  <!-- Supabase external system -->
  <rect x="1375" y="365" width="170" height="210" rx="14" class="system"/>
  <text x="1460" y="405" text-anchor="middle" class="label">« système externe »</text>
  <text x="1460" y="445" text-anchor="middle" class="title" style="font-size:28px;">Supabase</text>
  <text x="1460" y="490" text-anchor="middle" class="small">Authentification</text>
  <text x="1460" y="520" text-anchor="middle" class="small">Profils</text>
  <text x="1460" y="550" text-anchor="middle" class="small">Messages</text>

  <!-- Actor associations -->
  <line x1="150" y1="235" x2="315" y2="150" class="line"/>
  <line x1="150" y1="235" x2="315" y2="250" class="line"/>
  <line x1="150" y1="235" x2="315" y2="350" class="line"/>
  <line x1="150" y1="235" x2="315" y2="450" class="line"/>
  <line x1="150" y1="235" x2="630" y2="210" class="line"/>
  <line x1="150" y1="235" x2="630" y2="330" class="line"/>
  <line x1="150" y1="235" x2="630" y2="450" class="line"/>

  <line x1="150" y1="530" x2="630" y2="580" class="line"/>
  <line x1="150" y1="530" x2="630" y2="700" class="line"/>

  <line x1="150" y1="810" x2="895" y2="520" class="line"/>
  <line x1="150" y1="810" x2="895" y2="650" class="line"/>
  <line x1="150" y1="810" x2="895" y2="770" class="line"/>
  <line x1="150" y1="810" x2="895" y2="880" class="line"/>

  <!-- Dependencies to Supabase -->
  <line x1="895" y1="210" x2="1375" y2="420" class="dash"/>
  <text x="1130" y="300" class="tiny">« utilise »</text>
  <line x1="895" y1="330" x2="1375" y2="430" class="dash"/>
  <text x="1135" y="385" class="tiny">« utilise »</text>
  <line x1="895" y1="450" x2="1375" y2="455" class="dash"/>
  <text x="1135" y="438" class="tiny">« utilise »</text>
  <line x1="610" y1="450" x2="1375" y2="540" class="dash"/>
  <text x="965" y="483" class="tiny">« enregistre »</text>
  <line x1="1190" y1="650" x2="1375" y2="545" class="dash"/>
  <line x1="1190" y1="770" x2="1375" y2="545" class="dash"/>
  <line x1="1190" y1="880" x2="1375" y2="545" class="dash"/>

  <!-- Legend note -->
  <text x="790" y="965" text-anchor="middle" class="note">
    Supabase est représenté comme système externe, et non comme acteur humain.
  </text>
</svg>
